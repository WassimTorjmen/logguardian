services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Deux listeners :
      #   PLAINTEXT        -> port 29092, utilise entre containers (nom DNS = kafka)
      #   PLAINTEXT_HOST   -> port 9092,  utilise depuis la machine hote (localhost)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      # Le healthcheck tourne DANS le container -> port interne 29092
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  log-generator:
    build:
      context: ./log-generator
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: logs-raw
      REPLAY_SPEED: "100"
      DATA_DIR: /data
      LOG_SOURCES: linux,ssh,hadoop,spark,supercomputer,hdfs
      PYTHONUNBUFFERED: "1"
    restart: on-failure

  etl-processor:
    build:
      context: ./etl-processor
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - etl-output:/tmp/etl-output
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_INPUT_TOPIC: logs-raw
      KAFKA_OUTPUT_TOPIC: logs-processed
      KAFKA_ANOMALY_TOPIC: logs-anomalies
      KAFKA_GROUP_ID: etl-processor
      BATCH_SIZE: "500"
      BATCH_TIMEOUT_SEC: "30"
      LOCAL_MODE: "true"
      LOCAL_OUTPUT_DIR: /tmp/etl-output
      PYTHONUNBUFFERED: "1"
    restart: on-failure

  ml-model:
    build:
      context: ./ml-model
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./ml-model/models:/app/models
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_INPUT_TOPIC: logs-processed
      KAFKA_OUTPUT_TOPIC: logs-anomalies-ml
      KAFKA_GROUP_ID: ml-model
      MODEL_DIR: /app/models
      LOCAL_MODEL_MODE: "true"
      SEQUENCE_LENGTH: "10"
      DEVICE: cpu
      PYTHONUNBUFFERED: "1"
    restart: on-failure

  monitoring-ui:
    build:
      context: ./monitoring-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8050:8050"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: logs-anomalies-ml
      MAX_ROWS: 2000
      REFRESH_INTERVAL_MS: 3000
      ALERT_THRESHOLD: 1.3
      PYTHONUNBUFFERED: "1"
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-20b}
      FEEDBACK_PATH: /app/feedback/rag_feedback.jsonl
      RAG_NEGATIVE_LIMIT: ${RAG_NEGATIVE_LIMIT:-20}
    volumes:
      - ./feedback:/app/feedback
    restart: on-failure
  
  email-sender:
    build:
      context: ./email-sender
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: logs-anomalies-ml
      ALERT_THRESHOLD: 1.3
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_TO: ${MAIL_TO}
      EMAIL_COOLDOWN_SECONDS: 60
      PYTHONUNBUFFERED: "1"
    depends_on:
      kafka:
        condition: service_healthy
      ml-model:
        condition: service_started
    restart: unless-stopped


volumes:
  etl-output:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
