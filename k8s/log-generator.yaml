apiVersion: v1
kind: ServiceAccount
metadata:
  name: log-generator
  namespace: logguardian
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::148761640356:role/LogGuardianLogGeneratorRole
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: log-generator-config
  namespace: logguardian
data:
  KAFKA_BOOTSTRAP_SERVERS: kafka.logguardian.svc.cluster.local:29092
  KAFKA_TOPIC: logs-raw
  REPLAY_SPEED: "100"
  DATA_DIR: /data
  LOG_SOURCES: linux,ssh,hadoop,supercomputer
  DATA_S3_URI: s3://logguardian-datalake-148761640356/raw-logs/
  S3_BUCKET: logguardian-datalake-148761640356
  AWS_REGION: eu-west-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-generator
  namespace: logguardian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-generator
  template:
    metadata:
      labels:
        app: log-generator
    spec:
      serviceAccountName: log-generator
      initContainers:
        - name: sync-log-data
          image: amazon/aws-cli:2.15.57
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - aws s3 sync "$DATA_S3_URI" /data --only-show-errors
          env:
            - name: DATA_S3_URI
              valueFrom:
                configMapKeyRef:
                  name: log-generator-config
                  key: DATA_S3_URI
            - name: AWS_REGION
              value: eu-west-1
          volumeMounts:
            - name: log-data
              mountPath: /data
      containers:
        - name: log-generator
          image: 148761640356.dkr.ecr.eu-west-1.amazonaws.com/logguardian/log-generator:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: log-generator-config
          volumeMounts:
            - name: log-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: log-data
          emptyDir: {}
