apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-ui-config
  namespace: logguardian
data:
  KAFKA_BOOTSTRAP_SERVERS: kafka.logguardian.svc.cluster.local:29092
  KAFKA_TOPIC: logs-anomalies-ml
  MAX_ROWS: "2000"
  REFRESH_INTERVAL_MS: "3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-ui
  namespace: logguardian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-ui
  template:
    metadata:
      labels:
        app: monitoring-ui
    spec:
      enableServiceLinks: false
      containers:
        - name: monitoring-ui
          image: 148761640356.dkr.ecr.eu-west-1.amazonaws.com/logguardian/monitoring-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8050
          envFrom:
            - configMapRef:
                name: monitoring-ui-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8050
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-ui
  namespace: logguardian
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: monitoring-ui
  ports:
    - name: http
      port: 80
      targetPort: 8050
